name: Test

on:
  push:
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: windows-2025-vs2026
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.11"
      - name: Install FFmpeg
        shell: pwsh
        run: choco install -y ffmpeg --no-progress
      - name: Upgrade pip
        run: python -m pip install -U pip
      - name: Install package (editable, with dev and gui extras)
        run: pip install -e ".[dev,gui,reference]"
      - name: Ruff
        run: ruff check .
      - name: Pytest
        run: pytest
